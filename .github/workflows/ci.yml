name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Unit projects only — the integration project hits a real Supabase DB and
      # is intentionally excluded from CI (run it locally / in a gated job).
      - name: Unit tests (frontend + backend)
        run: npm run test:unit
